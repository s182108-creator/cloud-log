<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>통합 작업일지 V15.9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-body: #f1f2f6; --bg-card: #ffffff; --text-main: #2c3e50; --accent: #3498db; --border: #dcdde1; --calc-bg: #ffffff; }
        @media (prefers-color-scheme: dark) { 
            :root { --bg-body: #181a1b; --bg-card: #242729; --text-main: #e8e6e3; --border: #3e4446; --calc-bg: #2c3133; } 
        }
        body { font-family: sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--bg-card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .summary-bar { display: flex; gap: 10px; margin-bottom: 15px; padding: 15px; background: #2c3e50; color: white; border-radius: 10px; position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .summary-item { flex: 1; text-align: center; }
        .summary-label { font-size: 11px; opacity: 0.8; }
        .summary-value { font-size: 1.1em; font-weight: bold; margin-top: 3px; }
        #floatingCalc { position: fixed; top: 120px; right: 20px; width: 280px; background: var(--calc-bg); border: 2px solid var(--accent); border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); z-index: 1000; display: none; overflow: hidden; }
        .calc-header { background: var(--accent); color: white; padding: 12px; font-weight: bold; cursor: move; display: flex; justify-content: space-between; align-items: center; }
        .calc-body { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .calc-row { display: flex; justify-content: space-between; align-items: center; }
        .calc-row input { width: 110px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-body); color: var(--text-main); }
        .result-box { background: rgba(52, 152, 219, 0.15); border: 1px solid var(--accent); padding: 12px; border-radius: 8px; text-align: center; }
        .filter-section { display: flex; gap: 8px; margin-bottom: 15px; padding: 10px; background: rgba(52, 152, 219, 0.1); border-radius: 8px; align-items: center; justify-content: center; }
        .filter-section select { padding: 8px; border-radius: 6px; border: 1px solid var(--accent); background: var(--bg-card); color: var(--text-main); }
        .top-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; flex-grow: 1; font-size: 13px; }
        .btn-add { background: #3498db; } .btn-save { background: #2ecc71; } .btn-calc { background: #9b59b6; } .btn-excel { background: #f39c12; }
        .log-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; background: var(--bg-card); }
        .log-card.excluded { background: rgba(231, 76, 60, 0.05); border-color: #fab1a0; opacity: 0.8; }
        .log-header { padding: 10px; background: rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; }
        .log-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .field-group { display: flex; flex-direction: column; }
        label { font-size: 11px; color: #7f8c8d; margin-bottom: 4px; font-weight: bold; }
        input, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text-main); font-size: 14px; }
        .amount-input { border-color: #e67e22; color: #e67e22; font-weight: bold; }
        #loadingLayer { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center; color:white; font-weight:bold; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">
<div id="loadingLayer">데이터 처리 중...</div>
<div id="floatingCalc" onclick="event.stopPropagation()">
    <div class="calc-header" id="calcHeader">
        <span>🧮 단가 계산기</span>
        <span style="cursor:pointer; font-size: 20px;" onclick="closeCalc()">×</span>
    </div>
    <div class="calc-body">
        <div class="calc-row"><label>시작 시간</label><input type="time" id="sTime" oninput="calcByTime()"></div>
        <div class="calc-row"><label>종료 시간</label><input type="time" id="eTime" oninput="calcByTime()"></div>
        <div style="text-align:center; font-size: 11px; color: #7f8c8d;">- 또는 -</div>
        <div class="calc-row"><label>작업시간(분)</label><input type="number" id="directMin" placeholder="직접 입력" oninput="calcByMin()"></div>
        <div class="result-box">
            <div id="rTimeDisp" style="font-size: 11px; margin-bottom:3px; color: #7f8c8d;">시간을 입력하세요</div>
            <div id="rPriceDisp" style="font-size: 1.3em; color: #e74c3c; font-weight: bold;">0원</div>
        </div>
    </div>
</div>
<div class="container">
    <div class="summary-bar">
        <div class="summary-item"><div class="summary-label">총 매출</div><div id="totalAmountDisp" class="summary-value">0원</div></div>
        <div class="summary-item"><div class="summary-label">내 수당(제외항목 뺌)</div><div id="myShareDisp" class="summary-value" style="color: #f1c40f;">0원</div></div>
    </div>
    <div class="filter-section">
        📅 <select id="filterYear"></select>
        <select id="filterMonth">
            <option value="01">1월</option><option value="02">2월</option><option value="03">3월</option>
            <option value="04">4월</option><option value="05">5월</option><option value="06">6월</option>
            <option value="07">7월</option><option value="08">8월</option><option value="09">9월</option>
            <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
        </select>
        <button onclick="loadFromCloud()" style="margin-left:5px; padding:5px 15px; cursor:pointer;">조회</button>
    </div>
    <div class="top-controls">
        <input type="date" id="mainDate" style="flex-grow: 1.5;">
        <button class="btn btn-add" onclick="addLog()">➕ 추가</button>
        <button class="btn btn-calc" onclick="toggleCalc(event)">🧮 계산기</button>
        <button class="btn btn-save" onclick="saveToCloud(true)">💾 저장</button>
        <button class="btn btn-excel" onclick="exportEx()">📊 엑셀</button>
    </div>
    <div id="logList"></div>
</div>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxoy3X2D_0OXAN-_2VHgFY9QQAQDMNNaBKPXw6MD7skeiQDXfJYEQlAsT9T2CTVqSfesg/exec";

    function resetCalc() {
        document.getElementById('sTime').value = '';
        document.getElementById('eTime').value = '';
        document.getElementById('directMin').value = '';
        document.getElementById('rTimeDisp').innerText = '시간을 입력하세요';
        document.getElementById('rPriceDisp').innerText = '0원';
    }
    function closeCalc() { document.getElementById('floatingCalc').style.display = 'none'; resetCalc(); }
    function toggleCalc(e) { e.stopPropagation(); const el = document.getElementById('floatingCalc'); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    function handleGlobalClick(e) {
        const calc = document.getElementById('floatingCalc');
        if (calc.style.display === 'block') {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') closeCalc();
        }
    }
    function updateCalcResult(min) {
        let p = 0;
        if (min >= 1 && min <= 70) p = 200000;
        else if (min <= 130) p = 255000;
        else if (min <= 240) p = 310000;
        else if (min <= 479) p = 365000;
        else if (min >= 480) p = 475000;
        document.getElementById('rTimeDisp').innerText = `계산 결과: ${min}분`;
        document.getElementById('rPriceDisp').innerText = p.toLocaleString() + "원";
    }
    function calcByTime() {
        const s = document.getElementById('sTime').value;
        const e = document.getElementById('eTime').value;
        if (!s || !e) return;
        let diff = (new Date(`2000-01-01T${e}`) - new Date(`2000-01-01T${s}`)) / 60000;
        if (diff < 0) diff += 1440; 
        document.getElementById('directMin').value = diff;
        updateCalcResult(diff);
    }
    function calcByMin() {
        const min = parseInt(document.getElementById('directMin').value) || 0;
        document.getElementById('sTime').value = ''; document.getElementById('eTime').value = '';
        updateCalcResult(min);
    }

    function updateTotal() {
        let totalSales = 0, totalMyPay = 0;
        document.querySelectorAll('.log-card').forEach(card => {
            const isExcluded = card.querySelector('.exclude-check').checked;
            const amount = parseInt(card.querySelector('.amount-input').value.replace(/,/g, '')) || 0;
            const isMyBiz = card.querySelector('.my-biz-check').checked;
            totalSales += amount;
            if (!isExcluded) {
                card.classList.remove('excluded');
                totalMyPay += isMyBiz ? (amount * 0.5) : (amount * 0.4);
            } else {
                card.classList.add('excluded');
            }
        });
        document.getElementById('totalAmountDisp').innerText = totalSales.toLocaleString() + "원";
        document.getElementById('myShareDisp').innerText = Math.floor(totalMyPay).toLocaleString() + "원";
    }

    function addLog(data = null, isLoad = false) {
        // ID 보존: 로드된 데이터면 d.id를 쓰고, 새로 추가면 타임스탬프를 씀
        const id = data ? data.id : Date.now() + Math.floor(Math.random()*1000);
        const dateValue = data ? fixDate(data.date) : document.getElementById('mainDate').value;
        const div = document.createElement('div');
        div.className = 'log-card'; div.id = `card-${id}`;
        div.innerHTML = `
            <div class="log-header">
                <input type="date" class="edit-date" value="${dateValue}" style="border:none; background:none; font-weight:bold;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="color:#e74c3c; font-size:12px;">수당제외</label>
                    <input type="checkbox" class="exclude-check" ${data?.isExclude === true || data?.isExclude === "true" ? 'checked' : ''} onchange="updateTotal()">
                    <button onclick="if(confirm('삭제?')){document.getElementById('card-${id}').remove(); updateTotal();}" style="border:none; background:none; color:#7f8c8d; cursor:pointer;">삭제</button>
                </div>
            </div>
            <div class="log-grid">
                <div class="field-group"><label>작업자</label><input type="text" class="worker" value="${data?.worker || ''}"></div>
                <div class="field-group"><label>업체명</label><input type="text" class="company" value="${data?.company || ''}"></div>
                <div class="field-group"><label>금액</label><input type="text" class="amount amount-input" value="${data?.amount || ''}" oninput="updateTotal()" onblur="smartAmount(this)"></div>
                <div class="field-group"><label style="color:#e74c3c">내 거래처(10%)</label><input type="checkbox" class="my-biz-check" ${data?.myBiz === true || data?.myBiz === "true" ? 'checked' : ''} onchange="updateTotal()"></div>
                <div class="field-group"><label>장소</label><input type="text" class="location" value="${data?.location || ''}"></div>
                <div class="field-group"><label>유형</label><input type="text" class="type" value="${data?.type || ''}"></div>
                <div class="field-group"><label>30M</label><input type="text" class="m30" value="${data?.m30 || ''}"></div>
                <div class="field-group"><label>직수</label><input type="checkbox" class="direct" ${data?.direct === true || data?.direct === "true" ? 'checked' : ''}></div>
                <div class="field-group" style="grid-column: span 2;"><label>비고</label><textarea class="note" rows="2">${data?.note || ''}</textarea></div>
            </div>`;
        const list = document.getElementById('logList');
        isLoad ? list.appendChild(div) : list.insertBefore(div, list.firstChild);
        updateTotal();
    }

    async function loadFromCloud() {
        document.getElementById('loadingLayer').style.display = 'flex';
        try {
            const resp = await fetch(`${API_URL}?t=${Date.now()}`);
            const data = await resp.json();
            document.getElementById('logList').innerHTML = '';
            const targetYM = `${document.getElementById('filterYear').value}-${document.getElementById('filterMonth').value}`;
            data.filter(d => fixDate(d.date).startsWith(targetYM))
                .sort((a,b) => new Date(fixDate(a.date)) - new Date(fixDate(b.date)))
                .forEach(d => addLog(d, true));
            updateTotal();
        } catch(e) { alert("데이터 로드 실패"); }
        document.getElementById('loadingLayer').style.display = 'none';
    }

    async function saveToCloud(manual) {
        const logs = Array.from(document.querySelectorAll('.log-card')).map(card => ({
            id: card.id.replace('card-',''), // 카드 ID를 함께 전송하여 시트에서 해당 행을 찾아 업데이트하게 함
            date: card.querySelector('.edit-date').value,
            worker: card.querySelector('.worker').value,
            company: card.querySelector('.company').value,
            amount: card.querySelector('.amount').value,
            location: card.querySelector('.location').value,
            type: card.querySelector('.type').value,
            m30: card.querySelector('.m30').value,
            direct: card.querySelector('.direct').checked,
            myBiz: card.querySelector('.my-biz-check').checked,
            isExclude: card.querySelector('.exclude-check').checked,
            note: card.querySelector('.note').value
        }));
        document.getElementById('loadingLayer').style.display = 'flex';
        try {
            // mode: "no-cors"를 쓰면 응답 확인이 안되므로, 제대로 된 통신을 위해 삭제 후 전송
            await fetch(API_URL, { 
                method: "POST", 
                headers: { "Content-Type": "text/plain" }, // CORS 문제 방지를 위해 text/plain 사용
                body: JSON.stringify({ action: "save", logs: logs }) 
            });
            if(manual) alert("✅ 저장 완료 (시트에 새 기록 추가 또는 기존 항목 수정)");
        } catch(e) { alert("❌ 저장 실패"); }
        document.getElementById('loadingLayer').style.display = 'none';
    }

    function initFilter() {
        const yearSelect = document.getElementById('filterYear');
        const curr = new Date();
        for(let i = curr.getFullYear()-1; i <= curr.getFullYear()+1; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = i + "년";
            if(i === curr.getFullYear()) opt.selected = true;
            yearSelect.appendChild(opt);
        }
        document.getElementById('filterMonth').value = ("0" + (curr.getMonth() + 1)).slice(-2);
    }

    function fixDate(d) {
        if (!d) return "";
        let date = new Date(d);
        if (isNaN(date.getTime())) return String(d).split('T')[0];
        return `${date.getFullYear()}-${("0" + (date.getMonth() + 1)).slice(-2)}-${("0" + date.getDate()).slice(-2)}`;
    }

    function smartAmount(input) {
        let val = input.value.replace(/,/g, '');
        if (!val || isNaN(val)) return;
        let num = parseFloat(val);
        if (num > 0 && num < 1000) num *= 10000;
        input.value = num.toLocaleString();
        updateTotal();
    }

    function makeDraggable(el) {
        let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
        const header = document.getElementById("calcHeader");
        header.onmousedown = (e) => {
            if (e.target.tagName === 'SPAN') return;
            e.preventDefault(); p3 = e.clientX; p4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (e) => {
                p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
                el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px";
            };
        };
    }

    function exportEx() {
        const rows = Array.from(document.querySelectorAll('.log-card')).map(c => ({
            "날짜": c.querySelector('.edit-date').value,
            "업체명": c.querySelector('.company').value,
            "금액": c.querySelector('.amount').value,
            "비고": c.querySelector('.note').value
        }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "작업일지");
        XLSX.writeFile(wb, `작업일지_${document.getElementById('filterYear').value}_${document.getElementById('filterMonth').value}.xlsx`);
    }

    document.addEventListener('DOMContentLoaded', () => {
        initFilter();
        document.getElementById('mainDate').value = new Date().toISOString().split('T')[0];
        loadFromCloud();
        makeDraggable(document.getElementById("floatingCalc"));
    });
</script>
</body>
</html>
